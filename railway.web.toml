# Web API service (stock_ai on Railway).
#
# Railway service settings:
#   Root Directory: /  (repo root — NOT backend/)
#   Config file:    railway.web.toml
#   Volume:         attach one volume (e.g. mount /data) — persists bot.db + intentions/
#   Variables:      GEMINI_API_KEY, DOSSIER_API_URL, DOSSIER_API_TOKEN,
#                   FUND_MANAGER_FILL_PRICE=intention
#                   KITE_API_KEY, KITE_API_SECRET, KITE_USER_ID, KITE_PASSWORD,
#                   KITE_TOTP_SECRET (for daily live-price token refresh on stock_ai)
#                   SUPABASE_DATABASE_URL (health dashboard reads health_status)
#                   FRONTEND_URL, APP_REDIRECT_URL, DASHBOARD_SESSION_SECRET,
#                   AUTHORIZED_EMAIL, SUPABASE_ANON_KEY, SUPABASE_PROJECT_URL
#
# Fund manager cron runs in-process (no separate cron services):
#   KITE_REFRESH_CRON  default 30 0 * * 1-5  (6:00 AM IST weekdays — Zerodha token)
#   FUND_SELECTOR_CRON  default 30 3 * * 1-5  (~9:00 AM IST weekdays)
#   FUND_MORNING_CRON   default 45 3 * * 1-5  (~9:15 AM IST weekdays)
#   FUND_SCHEDULER_ENABLED=1  (auto-on when RAILWAY_ENVIRONMENT is set)
#
# Do NOT use railway.selector.toml / railway.morning.toml — those were for
# separate services that cannot share SQLite with stock_ai.

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
numReplicas = 1
