# Web API service (stock_ai on Railway).
# Root Directory in Railway UI must stay `backend`.
# Build vendors selector/ + data_layer/ from the monorepo clone into backend/.

[build]
builder = "NIXPACKS"
buildCommand = "bash scripts/railway_build.sh"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
numReplicas = 1
